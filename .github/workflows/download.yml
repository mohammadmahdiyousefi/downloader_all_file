name: Download any file from link

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک فایل'
        required: true
        type: string
      folder_name:
        description: 'پوشه ذخیره (پیش‌فرض: downloads)'
        required: false
        default: 'downloads'
        type: string

permissions:
  contents: write   # این خیلی مهمه

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install requests
        run: pip install requests

      - name: Run download script
        id: download
        run: |
          python download.py "${{ github.event.inputs.file_url }}" "${{ github.event.inputs.folder_name }}"
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Download from ${{ github.event.inputs.file_url }}"
            git push
          fi
