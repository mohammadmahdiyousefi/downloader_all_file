name: Download any file from link

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک فایل مورد نظر'
        required: true
        type: string
      folder_name:
        description: 'نام پوشه برای ذخیره (پیش‌فرض: downloads)'
        required: false
        default: 'downloads'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run download script
        run: python download.py "${{ github.event.inputs.file_url }}" "${{ github.event.inputs.folder_name }}"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Add downloaded file from ${{ github.event.inputs.file_url }}"
          git push
